<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 3×3 grid: cell=8px, gap=2px, margin=2px, radius=2px -->
  <!-- Row 0 -->
  <rect x="2"  y="2"  width="8" height="8" rx="2" class="i"/>
  <rect x="12" y="2"  width="8" height="8" rx="2" class="i"/>
  <rect x="22" y="2"  width="8" height="8" rx="2" class="i"/>
  <!-- Row 1 -->
  <rect x="2"  y="12" width="8" height="8" rx="2" class="i"/>
  <rect x="12" y="12" width="8" height="8" rx="2" class="i"/>
  <rect x="22" y="12" width="8" height="8" rx="2" class="i"/>
  <!-- Row 2 -->
  <rect x="2"  y="22" width="8" height="8" rx="2" class="i"/>
  <rect x="12" y="22" width="8" height="8" rx="2" class="a"/>
  <rect x="22" y="22" width="8" height="8" rx="2" class="i"/>
  <style>
    .i { fill: #3f3f46 }
    .a { fill: #fafafa }
    @media (prefers-color-scheme: light) {
      .i { fill: #d4d4d8 }
      .a { fill: #18181b }
    }
  </style>
</svg>
